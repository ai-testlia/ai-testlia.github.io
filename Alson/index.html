<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>子睿 的學習筆記｜學習筆記目錄</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=Noto+Serif+TC:wght@400;600;700&display=swap" rel="stylesheet">
<style>
/* ==========================================================================
   CSS Variables & Base Setup (Japanese Pop Anime & Neobrutalism Style)
   ========================================================================== */
:root {
  --color-text-primary: #1A1A1A;
  --color-text-secondary: #4A4A4A;
  --color-background-primary: #FFFFFF;
  --color-background-secondary: #FFFDF9; /* Off-white warm paper */
  --color-border-tertiary: #1A1A1A;      /* Heavy Ink Borders */
  --border-radius-md: 8px;
  --border-radius-lg: 12px;
  
  /* Vibrant Pop Anime Colors */
  --theme-orange: #FF5722;     /* Neon Orange (Primary Accent) */
  --theme-orange-light: #FBEBE6;
  --theme-yellow: #FFD54F;     /* Gold Yellow (Secondary Accent) */
  --theme-yellow-light: #FFFDF0;
  --theme-blue: #00E5FF;       /* Sky Cyan (Highlight Accent) */
  --theme-blue-light: #E0F7FA;
  --theme-red: #FF1744;        /* Attention Red */
  --theme-red-light: #FFEBEE;
  
  --transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}

@media (prefers-color-scheme: dark) {
  :root {
    --color-text-primary: #FFFDF9;
    --color-text-secondary: #D0CFCB;
    --color-background-primary: #181D26;
    --color-background-secondary: #0F131A;
    --color-border-tertiary: #FFFDF9;
    
    --theme-orange-light: #2A1F1B;
    --theme-yellow-light: #2A2518;
    --theme-blue-light: #18282B;
    --theme-red-light: #2D1A1E;
  }
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Noto Sans TC', sans-serif;
  color: var(--color-text-primary);
  background-color: var(--color-background-secondary);
  /* Manga Halftone Screentone Pattern */
  background-image: radial-gradient(rgba(26, 26, 26, 0.05) 10%, transparent 10%);
  background-size: 16px 16px;
  font-size: 14.5px;
  line-height: 1.9;
  padding: 2.5rem 1.25rem;
  -webkit-font-smoothing: antialiased;
}

@media (prefers-color-scheme: dark) {
  body {
    background-image: radial-gradient(rgba(255, 253, 249, 0.05) 10%, transparent 10%);
  }
}

.wrap { max-width: 820px; margin: 0 auto; padding-bottom: 4rem; }
.container { max-width: 820px; margin: 0 auto; padding-bottom: 4rem; }

/* ==========================================================================
   Hero Section (Anime Game Level Load Screen)
   ========================================================================== */
.hero {
  padding: 3.5rem 2rem 3rem;
  text-align: center;
  margin-bottom: 2.5rem;
  position: relative;
  overflow: hidden;
  border-radius: var(--border-radius-lg);
  border: 3px solid var(--color-border-tertiary);
  box-shadow: 8px 8px 0px var(--color-border-tertiary);
}
.hero-tag {
  display: inline-block;
  font-size: 11px;
  font-weight: 800;
  letter-spacing: 0.15em;
  padding: 0.4rem 1.2rem;
  border-radius: 20px;
  margin-bottom: 1.2rem;
  background: var(--theme-orange);
  color: #FFFFFF;
  border: 2px solid #1A1A1A;
  box-shadow: 3px 3px 0px #1A1A1A;
}
.hero h1 {
  font-family: 'Noto Serif TC', serif;
  font-size: 2.2rem;
  font-weight: 900;
  letter-spacing: 0.05em;
  line-height: 1.35;
  color: #1A1A1A;
  text-shadow: 2px 2px 0px #FFFFFF, -2px -2px 0px #FFFFFF, 2px -2px 0px #FFFFFF, -2px 2px 0px #FFFFFF, 4px 4px 0px var(--color-border-tertiary);
  margin-bottom: 0.8rem;
}
.hero p {
  font-size: 13px;
  font-weight: 700;
  color: #1A1A1A;
  background: rgba(255, 255, 255, 0.9);
  display: inline-block;
  padding: 2px 12px;
  border-radius: 4px;
  border: 1.5px solid #1A1A1A;
}

/* Hero Variations (Manga Stripes) */
.hero.reading {
  background: repeating-linear-gradient(45deg, var(--theme-blue), var(--theme-blue) 15px, #B2EBF2 15px, #B2EBF2 30px);
  color: #1A1A1A !important;
}
.hero.classical {
  background: repeating-linear-gradient(45deg, var(--theme-yellow), var(--theme-yellow) 15px, #FFE082 15px, #FFE082 30px);
  color: #1A1A1A !important;
}
.hero.writing {
  background: repeating-linear-gradient(45deg, #A5D6A7, #A5D6A7 15px, #C8E6C9 15px, #C8E6C9 30px);
  color: #1A1A1A !important;
}

/* ==========================================================================
   TOC (Quest Directory Map)
   ========================================================================== */
.toc {
  background: var(--color-background-primary);
  border: 3px solid var(--color-border-tertiary);
  border-radius: var(--border-radius-lg);
  padding: 1.8rem;
  margin-bottom: 2.5rem;
  box-shadow: 6px 6px 0px var(--color-border-tertiary);
}
.toc-title {
  font-family: 'Noto Serif TC', serif;
  font-size: 17px;
  font-weight: 900;
  margin-bottom: 1.2rem;
  color: var(--color-text-primary);
  display: flex;
  align-items: center;
  gap: 8px;
}
.toc-list, .toc ul {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
  gap: 12px;
  list-style: none;
  padding-left: 0;
}
.toc-item, .toc li {
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 14px;
  font-weight: 600;
  background: var(--theme-yellow-light);
  border: 2px solid var(--color-border-tertiary);
  padding: 8px 12px;
  border-radius: var(--border-radius-md);
  transition: var(--transition);
}
.toc li a {
  text-decoration: none;
  color: inherit;
  display: flex;
  align-items: center;
  gap: 10px;
  width: 100%;
}
.toc-item:hover, .toc li:hover {
  transform: translate(-2px, -2px);
  box-shadow: 3px 3px 0px var(--color-border-tertiary);
  background: var(--theme-blue-light);
}
.toc-num, .toc .toc-num {
  width: 24px;
  height: 24px;
  background: var(--theme-orange);
  color: #FFFFFF;
  border: 1.5px solid #1A1A1A;
  border-radius: 50%;
  font-size: 11px;
  font-weight: 800;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  box-shadow: 1.5px 1.5px 0px #1A1A1A;
}

/* ==========================================================================
   Section Headers (Quest Title Ribbons)
   ========================================================================== */
.section-header {
  display: flex;
  align-items: center;
  gap: 12px;
  margin: 3.5rem 0 1.8rem;
}
.section-icon, .section-num {
  font-size: 20px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 44px;
  height: 44px;
  background: var(--theme-yellow);
  border: 3px solid var(--color-border-tertiary);
  border-radius: 50%;
  box-shadow: 3px 3px 0px var(--color-border-tertiary);
  flex-shrink: 0;
  color: #1A1A1A !important;
  font-weight: 900;
}
.section-header h2 {
  font-family: 'Noto Serif TC', serif;
  font-size: 1.5rem;
  font-weight: 900;
  margin: 0;
}
.section-title, .section-header h2 {
  font-family: 'Noto Serif TC', serif;
  font-size: 1.4rem;
  font-weight: 900;
  color: var(--color-text-primary);
  background: var(--theme-blue-light);
  border: 3px solid var(--color-border-tertiary);
  padding: 6px 18px;
  border-radius: var(--border-radius-md);
  box-shadow: 4px 4px 0px var(--color-border-tertiary);
  position: relative;
  flex-grow: 1;
}

/* ==========================================================================
   Cards (RPG Quest Board Panels)
   ========================================================================== */
.card {
  background: var(--color-background-primary);
  border: 3px solid var(--color-border-tertiary);
  border-radius: var(--border-radius-lg);
  padding: 1.8rem;
  margin-bottom: 1.8rem;
  box-shadow: 6px 6px 0px var(--color-border-tertiary);
  transition: var(--transition);
}
.card:hover {
  transform: translate(-1px, -1px);
  box-shadow: 7px 7px 0px var(--color-border-tertiary);
}
.card-text {
  font-size: 15.5px;
}
.card-title {
  display: flex;
  align-items: center;
  font-family: 'Noto Serif TC', serif;
  font-weight: 900;
  font-size: 16px;
  margin-bottom: 1rem;
}
.dot {
  width: 12px;
  height: 12px;
  border-radius: 50%;
  display: inline-block;
  margin-right: 8px;
  border: 1.5px solid #1A1A1A;
}
.dot.purple { background: #b085f5; }
.dot.teal { background: #4db6ac; }
.dot.coral { background: #ff8a80; }
.dot.amber { background: #ffd54f; }

.highlight {
  color: var(--theme-red);
  font-weight: 800;
  border-bottom: 2px solid var(--theme-red);
  padding-bottom: 1px;
}
.highlight-blue {
  background: var(--theme-blue-light);
  padding: 2px 6px;
  border-radius: 4px;
  border: 1.5px solid var(--color-border-tertiary);
  font-weight: 700;
  color: #00838F;
}

/* ==========================================================================
   Step Cards (RPG Stage Map cards)
   ========================================================================== */
.step-grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 1.5rem;
}
.step-card {
  background: var(--color-background-secondary);
  border: 3px solid var(--color-border-tertiary);
  border-left: 8px solid var(--theme-orange); /* Vibrant left line */
  border-radius: var(--border-radius-lg);
  padding: 1.5rem;
  position: relative;
  box-shadow: 5px 5px 0px var(--color-border-tertiary);
  transition: var(--transition);
}
.step-card:hover {
  transform: translate(-2px, -2px);
  box-shadow: 7px 7px 0px var(--color-border-tertiary);
}
.step-num {
  position: absolute;
  top: 1rem;
  right: 1.2rem;
  font-size: 26px;
  font-weight: 900;
  color: var(--theme-orange);
  opacity: 0.35;
  font-family: 'Noto Serif TC', serif;
  font-style: italic;
}
.step-title {
  font-family: 'Noto Serif TC', serif;
  font-size: 17px;
  font-weight: 900;
  color: var(--color-text-primary);
  margin-bottom: 0.6rem;
  display: flex;
  align-items: center;
  gap: 8px;
}
.step-desc {
  font-size: 14px;
  color: var(--color-text-secondary);
  line-height: 1.7;
}

/* ==========================================================================
   Alerts & Notifications (Game Dialogue Bubble Boxes)
   ========================================================================== */
.alert {
  border-radius: var(--border-radius-md);
  padding: 1.2rem;
  margin: 1.5rem 0;
  display: flex;
  gap: 12px;
  align-items: flex-start;
  border: 3px solid var(--color-border-tertiary);
  box-shadow: 4px 4px 0px var(--color-border-tertiary);
}
.alert-icon {
  font-size: 22px;
  line-height: 1;
  margin-top: 2px;
}
.alert-label {
  font-size: 12px;
  font-weight: 800;
  letter-spacing: 0.05em;
  margin-bottom: 4px;
  text-transform: uppercase;
}
.alert-text {
  font-size: 14px;
  line-height: 1.65;
  font-weight: 500;
}

.alert.tip {
  background: var(--theme-blue-light);
  color: #006064;
}
.alert.tip .alert-label { color: #00838F; }

.alert.warn {
  background: var(--theme-red-light);
  color: #b71c1c;
}
.alert.warn .alert-label { color: var(--theme-red); }

.alert.success {
  background: #E8F5E9;
  color: #1B5E20;
}
.alert.success .alert-label { color: #2E7D32; }
.alert.amber {
  background: var(--theme-yellow-light);
  color: #78350f;
}
.alert.amber .alert-label { color: #f59e0b; }

/* ==========================================================================
   Compare Grid (Pop Manga Comparison Box)
   ========================================================================== */
.compare-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 1.2rem;
  margin: 1.5rem 0;
}
.compare-card {
  border-radius: var(--border-radius-md);
  padding: 1.2rem;
  border: 3px solid var(--color-border-tertiary);
  box-shadow: 4px 4px 0px var(--color-border-tertiary);
}
.compare-card.bad {
  background: var(--theme-red-light);
}
.compare-card.good {
  background: #E8F5E9;
}
.compare-label {
  font-size: 12.5px;
  font-weight: 800;
  margin-bottom: 8px;
}
.compare-card.bad .compare-label { color: #D50000; }
.compare-card.good .compare-label { color: #1B5E20; }

/* ==========================================================================
   Question Boxes & Sub-Panels
   ========================================================================== */
.card .qbox, .card .question {
  border: 3px solid var(--color-border-tertiary);
  border-radius: var(--border-radius-lg);
  background: var(--color-background-secondary);
  padding: 1.5rem;
  margin-bottom: 1.5rem;
  box-shadow: 4px 4px 0px var(--color-border-tertiary);
  transition: var(--transition);
}
.card .qbox:hover, .card .question:hover {
  transform: translate(-1px, -1px);
  box-shadow: 5px 5px 0px var(--color-border-tertiary);
}
.card .qbox:last-child, .card .question:last-child {
  margin-bottom: 0;
}
.q-title, .exercise-title, .q-text {
  font-weight: 800;
  font-size: 15.5px;
  margin-bottom: 1rem;
  display: flex;
  align-items: flex-start;
  gap: 8px;
}
.q-num, .exercise-box .dot, .exercise-title .dot {
  background: var(--theme-orange);
  color: #FFFFFF;
  border: 2px solid #1A1A1A;
  width: 24px;
  height: 24px;
  border-radius: 6px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
  font-weight: 800;
  flex-shrink: 0;
  margin-top: 2px;
  box-shadow: 1.5px 1.5px 0px #1A1A1A;
}

/* ==========================================================================
   Details summary (RPG Secret Box style)
   ========================================================================== */
details.q-ans, .answer-area {
  background: var(--theme-yellow-light);
  padding: 1rem;
  border-radius: var(--border-radius-md);
  margin-top: 1rem;
  border: 3px solid var(--color-border-tertiary);
  box-shadow: 3px 3px 0px var(--color-border-tertiary);
  transition: var(--transition);
}
details.q-ans summary {
  font-weight: 800;
  color: var(--color-text-primary);
  cursor: pointer;
  outline: none;
  font-size: 13.5px;
  display: flex;
  align-items: center;
  gap: 6px;
}
details.q-ans summary:hover {
  color: var(--theme-orange);
}
.ans-line {
  border-bottom: 2px dashed var(--color-border-tertiary);
  opacity: 0.6;
  height: 2.2rem;
  margin-bottom: 1rem;
}
.btn-ans {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: var(--color-background-primary);
  border: 3px solid var(--color-border-tertiary);
  color: var(--color-text-primary);
  padding: 6px 14px;
  font-size: 13px;
  font-weight: 800;
  border-radius: var(--border-radius-md);
  cursor: pointer;
  transition: var(--transition);
  box-shadow: 3px 3px 0px var(--color-border-tertiary);
  margin-top: 0.5rem;
}
.btn-ans:hover {
  background: var(--theme-yellow);
  transform: translate(-1px, -1px);
  box-shadow: 4px 4px 0px var(--color-border-tertiary);
}
.ans-content {
  display: none;
  margin-top: 1rem;
  padding: 1rem;
  border-radius: var(--border-radius-md);
  border: 3px solid var(--color-border-tertiary);
  background: var(--theme-blue-light);
  color: var(--color-text-primary);
  font-size: 14px;
  font-weight: 600;
  box-shadow: 3px 3px 0px var(--color-border-tertiary);
}
details.q-ans .ans-content {
  display: block;
  border-top: 2px dashed var(--color-border-tertiary);
  background: transparent;
  box-shadow: none;
  border: none;
  padding: 1rem 0 0 0;
  border-radius: 0;
}
.ans-content strong, .answer-label {
  color: var(--theme-orange);
  font-weight: 800;
}

/* ==========================================================================
   Formula card (RPG Equipment Recipe Style)
   ========================================================================== */
.formula {
  background: #1B222E;
  color: #FFFFFF;
  padding: 1.5rem;
  border: 3px solid var(--color-border-tertiary);
  border-radius: var(--border-radius-lg);
  margin: 1.5rem 0;
  text-align: center;
  font-size: 17px;
  font-weight: 800;
  letter-spacing: 1px;
  box-shadow: 5px 5px 0px var(--color-border-tertiary);
  text-shadow: 2px 2px 0px #000000;
}
.formula span {
  color: var(--theme-yellow);
  text-decoration: underline;
}

/* ==========================================================================
   Exercise Boxes & Lists
   ========================================================================== */
.exercise-box {
  background: var(--color-background-primary);
  border: 3px solid var(--color-border-tertiary);
  border-radius: var(--border-radius-lg);
  padding: 1.8rem;
  margin-top: 2rem;
  box-shadow: 6px 6px 0px var(--color-border-tertiary);
}

/* ==========================================================================
   Index Page Grid & Cards
   ========================================================================== */
.nav-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
  gap: 1.5rem;
  margin: 1.5rem 0;
}
.nav-card {
  background: var(--color-background-primary);
  border: 3px solid var(--color-border-tertiary);
  border-radius: var(--border-radius-lg);
  padding: 1.8rem;
  text-decoration: none;
  color: var(--color-text-primary);
  transition: var(--transition);
  display: flex;
  flex-direction: column;
  align-items: center;
  text-align: center;
  box-shadow: 6px 6px 0px var(--color-border-tertiary);
}
.nav-card:hover {
  transform: translate(-3px, -3px);
  box-shadow: 9px 9px 0px var(--color-border-tertiary);
  border-color: var(--theme-orange);
}
.nav-card .dot {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  background: var(--theme-yellow);
  color: #1A1A1A;
  border: 2px solid #1A1A1A;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 900;
  margin-bottom: 1rem;
  font-size: 14px;
  box-shadow: 2px 2px 0px #1A1A1A;
  flex-shrink: 0;
}
.nav-card h3 {
  margin: 0 0 0.5rem 0;
  font-family: 'Noto Serif TC', serif;
  font-size: 1.25rem;
  font-weight: 800;
  color: var(--color-text-primary);
}
.nav-card p {
  margin: 0;
  color: var(--color-text-secondary);
  font-size: 13px;
}

/* Flow Stepper for other notes */
.flow {
  display: flex;
  align-items: center;
  flex-wrap: wrap;
  gap: 8px;
  margin: 1rem 0;
}
.flow-step {
  background: var(--color-background-secondary);
  border: 2px solid var(--color-border-tertiary);
  padding: 6px 12px;
  border-radius: var(--border-radius-md);
  font-size: 13px;
  font-weight: 600;
}
.flow-arrow {
  color: var(--theme-orange);
  font-weight: 900;
}

/* Keyword grids */
.keyword-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 1rem;
  margin: 1rem 0;
}
.keyword-card {
  background: var(--color-background-secondary);
  border: 2px solid var(--color-border-tertiary);
  border-radius: var(--border-radius-md);
  padding: 1.2rem;
  box-shadow: 3px 3px 0px var(--color-border-tertiary);
}
.kw-word {
  font-family: 'Noto Serif TC', serif;
  font-weight: 900;
  font-size: 15.5px;
  color: var(--theme-orange);
  margin-bottom: 6px;
}
.kw-def {
  font-size: 13px;
  color: var(--color-text-secondary);
}

/* Example Box for print views */
.example-box {
  background: var(--color-background-secondary);
  border-left: 5px solid var(--theme-blue);
  border-radius: 0 var(--border-radius-md) var(--border-radius-md) 0;
  padding: 1.2rem;
  margin: 1rem 0;
  border-top: 2px solid var(--color-border-tertiary);
  border-right: 2px solid var(--color-border-tertiary);
  border-bottom: 2px solid var(--color-border-tertiary);
  box-shadow: 3px 3px 0px var(--color-border-tertiary);
}
.example-box.teal { border-left-color: #4db6ac; }
.example-box.coral { border-left-color: #ff8a80; }
.example-box.amber { border-left-color: #ffd54f; }
.example-box.pink { border-left-color: #ff80ab; }
.example-label {
  font-size: 11px;
  font-weight: 800;
  margin-bottom: 4px;
  color: var(--theme-orange);
}
.example-text {
  font-size: 13.5px;
  line-height: 1.7;
}

/* ==========================================================================
   Print and Footer
   ========================================================================== */
@media print {
  @page { margin: 12mm 10mm; }
  body { background: white; background-image: none; color: black; }
  .wrap { max-width: 100%; padding: 0; }
  .toc { display: none; }
  a { color: inherit; text-decoration: none; }
  .card, .qbox, .step-card, .alert, .formula, .example-box, .compare-grid, .keyword-grid, .flow, .exercise-box {
    page-break-inside: avoid;
    break-inside: avoid;
  }
  .section-header { page-break-before: always; page-break-after: avoid; }
  .section-header:first-of-type { page-break-before: auto; }
  .hero { page-break-after: avoid; }
  details.q-ans { display: none; }
  .print-btn-container { display: none !important; }
}

.print-btn-container {
  margin-top: 2.5rem;
  text-align: center;
