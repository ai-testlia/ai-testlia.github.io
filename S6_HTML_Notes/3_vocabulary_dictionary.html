    "part_of_speech": "副詞",
    "example": "君子坦蕩蕩，小人長戚戚"
  },
  {
    "word": "疚",
    "type": "字詞糾正",
    "original_definition": "正：痛苦。",
    "part_of_speech": "動詞",
    "example": "內省不疚，夫何憂何懼"
  },
  {
    "word": "過",
    "type": "字詞糾正",
    "original_definition": "正：超過。",
    "part_of_speech": "動詞",
    "example": "君子恥其言而過其行"
  },
  {
    "word": "質",
    "type": "字詞糾正",
    "original_definition": "正：本質。",
    "part_of_speech": "名詞",
    "example": "君子義以為質"
  },
  {
    "word": "孫",
    "type": "通假字",
    "original_definition": "同「遜」，謙遜。",
    "part_of_speech": "形容詞",
    "example": "禮以行之，孫以出之，信以成之"
  }
];
  
  let currentFilter = 'all';
  
  function renderTable(data) {
    const tbody = document.getElementById('vocabBody');
    const countDiv = document.getElementById('vocabCount');
    tbody.innerHTML = '';
    
    if (data.length === 0) {
      tbody.innerHTML = '<tr><td colspan="5" style="text-align: center; padding: 30px; color: var(--color-text-secondary);">沒有找到相符的字詞條目。</td></tr>';
      countDiv.textContent = '共找到 0 個條目';
      return;
    }
    
    data.forEach(item => {
      const tr = document.createElement('tr');
      
      const badgeClass = item.type === '通假字' ? 'badge-type tongjia' : 'badge-type correct';
      const posHtml = item.part_of_speech ? `<span class="pos-tag">${item.part_of_speech}</span>` : '';
      
      tr.innerHTML = `
        <td style="font-weight: bold; font-size: 16px; font-family: 'Noto Serif TC', serif; color: var(--color-text-primary);">${item.word}</td>
        <td><span class="${badgeClass}">${item.type}</span></td>
        <td>${posHtml}</td>
        <td style="font-size: 13.5px; color: var(--color-text-primary);">${item.original_definition}</td>
        <td style="font-size: 13px; font-style: italic; color: var(--color-text-secondary);">${item.example}</td>
      `;
      tbody.appendChild(tr);
    });
    
    countDiv.textContent = `共找到 ${data.length} 個條目`;
  }
  
  function filterAndSearch() {
    const query = document.getElementById('searchInput').value.trim().toLowerCase();
    
    const filtered = vocabData.filter(item => {
      const matchesType = currentFilter === 'all' || item.type === currentFilter;
      const matchesQuery = !query || 
                           item.word.toLowerCase().includes(query) || 
                           item.original_definition.toLowerCase().includes(query) || 
                           item.part_of_speech.toLowerCase().includes(query) || 
                           item.example.toLowerCase().includes(query);
      return matchesType && matchesQuery;
    });
    
    renderTable(filtered);
  }
  
  function filterType(type, btn) {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentFilter = type;
    filterAndSearch();
  }
  
  document.getElementById('searchInput').addEventListener('input', filterAndSearch);
  
  // Initial Render
  window.onload = () => {
    renderTable(vocabData);
  };
</script>
</body>
</html>
