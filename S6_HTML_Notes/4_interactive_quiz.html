    margin-top: 0;

    cursor: pointer;
    text-align: center;
    transition: all 0.2s;
    font-weight: 500;
  }

    background-color: var(--color-turkish-blue-light);
    border-color: var(--color-turkish-blue);

    background: var(--color-background-secondary);

    border-radius: var(--border-radius-md);

    margin-bottom: 12px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 15px;
    transition: all 0.2s;
    font-size: 14.5px;
    color: var(--color-text-primary);
  }
  .option-card:hover {
    border-color: var(--color-classic-gold);
    background-color: var(--color-classic-gold-light);
  }

    background-color: rgba(46, 204, 113, 0.1) !important;
    border-color: #2ecc71 !important;
    color: #27ae60 !important;

    border-color: #e74c3c !important;
    color: #c0392b !important;

    height: 28px;
    border-radius: 50%;
    background-color: var(--color-turkish-blue);

    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: bold;
    font-size: 13px;

  }

<div class="wrap">
  <div class="hero">
    <div class="hero-tag">高中・中國語文科</div>
    <h1>十二篇範文模擬選擇題練習庫</h1>
    <p>收錄高中 DSE 十二篇範文核心字詞釋義選擇題，支援「分篇精修」與「隨機挑戰」雙模式，即時詳解，強化字義記憶。</p>
  </div>

  <div class="quiz-container">
    
    <!-- 1. 設定畫面 -->
    <div id="setupScreen" class="setup-screen">

      <div class="mode-grid">
        <div class="mode-card" onclick="selectMode('random')">
          <h3>🎲 隨機挑戰</h3>
          <p style="font-size: 13px; color: var(--color-text-secondary);">從全部題庫中隨機抽取 20 題，進行綜合能力測試。</p>
        </div>
        <div class="mode-card" onclick="selectMode('text')">
          <h3>📚 分篇精修</h3>
          <p style="font-size: 13px; color: var(--color-text-secondary);">選擇特定的經典範文，針對該篇章字詞進行專項特訓。</p>
        </div>
      </div>
      
      <div id="textSelectSection" style="display: none; margin-top: 20px;">
        <h3 class="serif" style="color: var(--color-turkish-blue); font-size: 1.1rem;">請點選範文篇章：</h3>
        <div class="text-select-grid" id="textSelectGrid">
          <!-- Rendered by JS -->
        </div>
      </div>
      
      <div style="text-align: center; margin-top: 30px;">
        <button id="startBtn" class="action-btn" disabled onclick="startQuiz()">開始作答</button>
      </div>
    </div>
    
    <!-- 2. 作答畫面 -->
    <div id="quizScreen" class="quiz-screen hidden">
      <div class="progress-container">
        <span class="quiz-info" id="questionNum">第 1 / 10 題</span>
        <div class="progress-bar-bg">
          <div id="progressBarFill" class="progress-bar-fill"></div>
        </div>
        <span class="quiz-info" id="quizTimer">範文：--</span>
      </div>
      
      <div class="qbox" style="background: none; border-color: var(--color-border-gold); padding: 25px;">
        <div class="q-title" id="questionText" style="font-size: 1.2rem; font-weight: bold; line-height: 1.6; margin-bottom: 20px; color: var(--color-text-primary);">載入中...</div>
        <div id="optionsContainer">
          <!-- Rendered by JS -->
        </div>
      </div>
      
      <div id="explanationContainer" class="example-box" style="display: none; margin-top: 15px;">
        <div class="example-label">💡 考點詳解與翻譯</div>
        <p id="explanationText" style="margin: 0; font-size: 13.5px; color: var(--color-text-primary);"></p>
      </div>
      
      <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 25px;">
        <button class="filter-btn" onclick="exitQuiz()">放棄作答</button>
        <button id="nextBtn" class="action-btn" disabled onclick="nextQuestion()">下一題</button>
      </div>
    </div>
    
    <!-- 3. 結果結算畫面 -->
    <div id="resultScreen" class="result-screen hidden">
      <h2 class="serif" style="color: var(--color-turkish-blue); text-align: center; margin-bottom: 10px;">練習完成！</h2>
      <div class="result-score" id="resultScore">0 / 0</div>
      <div class="score-desc" id="scoreDesc">做得不錯！繼續加油。</div>
      
      <div style="text-align: center; margin-bottom: 30px; display: flex; gap: 15px; justify-content: center;">
        <button class="action-btn" onclick="resetQuiz()">再做一次</button>
        <button class="filter-btn" onclick="resetQuiz()">返回主選單</button>
      </div>
      
      <div id="wrongReviewSection" class="wrong-review-list hidden">
        <h3 class="serif" style="color: #c0392b; font-size: 1.2rem; margin-bottom: 15px;">❌ 錯題回顧與解析</h3>
        <div id="wrongItemsContainer">
          <!-- Rendered by JS -->
        </div>
      </div>
    </div>
    
  </div>

  <div class="print-btn-container" style="border-top: 1px dashed var(--color-border-tertiary); padding-top: 20px;">
    <a href="index.html" class="print-btn">↩️ 返回筆記總目錄</a>

  <footer class="note-footer">
    <div class="copyright">

  // Initialize Text Selection Grid
  function initTextGrid() {
    const grid = document.getElementById('textSelectGrid');
    grid.innerHTML = '';
    
    // Group questions by text_source
    const textCounts = {};
    questionsData.forEach(q => {
      textCounts[q.text_source] = (textCounts[q.text_source] || 0) + 1;
    });
    
    Object.keys(textCounts).forEach(textName => {
      const btn = document.createElement('div');
      btn.className = 'text-btn';
      btn.innerHTML = `${textName} <span style="font-size: 11px; opacity:0.7;">(${textCounts[textName]}題)</span>`;
      btn.onclick = () => selectText(textName, btn);
      grid.appendChild(btn);
    });
  }
  
  function selectMode(mode) {
    quizMode = mode;
    document.querySelectorAll('.mode-card').forEach(c => c.style.borderColor = 'var(--color-border-tertiary)');
    
    const randomCard = document.querySelectorAll('.mode-card')[0];
    const textCard = document.querySelectorAll('.mode-card')[1];
    
    if (mode === 'random') {
      randomCard.style.borderColor = 'var(--color-turkish-blue)';
      document.getElementById('textSelectSection').style.display = 'none';
      selectedText = null;
      document.getElementById('startBtn').disabled = false;
    } else {
      textCard.style.borderColor = 'var(--color-turkish-blue)';
      document.getElementById('textSelectSection').style.display = 'block';
      initTextGrid();
      document.getElementById('startBtn').disabled = true; // Wait for text selection
    }
  }
  
  function selectText(textName, btn) {
    document.querySelectorAll('.text-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    selectedText = textName;
    document.getElementById('startBtn').disabled = false;
  }

    document.getElementById('setupScreen').classList.add('hidden');
    document.getElementById('quizScreen').classList.remove('hidden');
    document.getElementById('resultScreen').classList.add('hidden');
    
    // Filter questions based on mode
    if (quizMode === 'random') {
      // Shuffle and pick 20
      currentQuestions = [...questionsData].sort(() => 0.5 - Math.random()).slice(0, 20);
    } else {
      // Pick all questions for the selected text
      currentQuestions = questionsData.filter(q => q.text_source === selectedText);
    }
    
    currentQuestionIndex = 0;
    score = 0;
    wrongAnswers = [];
    showQuestion();
  }
  
  function showQuestion() {
    hasAnswered = false;
    document.getElementById('nextBtn').disabled = true;
    document.getElementById('explanationContainer').style.display = 'none';
    
    const question = currentQuestions[currentQuestionIndex];
    
    // Update progress
    document.getElementById('questionNum').textContent = `第 ${currentQuestionIndex + 1} / ${currentQuestions.length} 題`;
    document.getElementById('progressBarFill').style.width = `${((currentQuestionIndex) / currentQuestions.length) * 100}%`;
    document.getElementById('quizTimer').textContent = `範文：${question.text_source}`;
    
    document.getElementById('questionText').textContent = `${question.id}. ${question.question}`;
    
    const optionsContainer = document.getElementById('optionsContainer');
    optionsContainer.innerHTML = '';
    
    question.options.forEach(opt => {
      const card = document.createElement('div');
      card.className = 'option-card';
      card.innerHTML = `
        <span class="option-label">${opt.label}</span>
        <span>${opt.text}</span>
      `;
      card.onclick = () => checkAnswer(opt.label, card);
      optionsContainer.appendChild(card);
    });
  }
  
  function checkAnswer(selectedLabel, cardElement) {
    if (hasAnswered) return;
    hasAnswered = true;
    
    const question = currentQuestions[currentQuestionIndex];
    const correctLabel = question.answer;
    
    const options = document.querySelectorAll('.option-card');
    
    if (selectedLabel === correctLabel) {
      cardElement.classList.add('correct');
      score++;
    } else {
      cardElement.classList.add('wrong');
      // Highlight the correct answer
      options.forEach(card => {
        if (card.querySelector('.option-label').textContent === correctLabel) {
          card.classList.add('correct');
        }
      });
      wrongAnswers.push({
        question: question,
        selected: selectedLabel
      });
    }
    
    // Show explanation
    document.getElementById('explanationText').textContent = question.explanation;
    document.getElementById('explanationContainer').style.display = 'block';
    
    document.getElementById('nextBtn').disabled = false;
  }
  
  function nextQuestion() {
    currentQuestionIndex++;
    if (currentQuestionIndex < currentQuestions.length) {
      showQuestion();
    } else {
      showResults();
    }
  }
  
  function showResults() {
    document.getElementById('quizScreen').classList.add('hidden');
    document.getElementById('resultScreen').classList.remove('hidden');
    
    document.getElementById('resultScore').textContent = `${score} / ${currentQuestions.length}`;
    
    const percent = (score / currentQuestions.length) * 100;
    let desc = '';
    if (percent === 100) desc = '🌟 太棒了！全部答對，文言字詞能力非常卓越！';
    else if (percent >= 80) desc = '✨ 非常優秀！對大部分範文字詞掌握得很踏實！';
    else if (percent >= 60) desc = '👍 合格了！基本字義理解正確，仍有進步空間。';
    else desc = '📖 需要再加把勁！建議多複習前三單元的虛詞、實詞與通假字字典。';
    
    document.getElementById('scoreDesc').textContent = desc;
    
    // Render wrong answers review
    const reviewSection = document.getElementById('wrongReviewSection');
    const container = document.getElementById('wrongItemsContainer');
    container.innerHTML = '';
    
    if (wrongAnswers.length > 0) {
      reviewSection.classList.remove('hidden');
      wrongAnswers.forEach(item => {
        const div = document.createElement('div');
        div.className = 'wrong-item';
        div.innerHTML = `
          <div class="wrong-q">[${item.question.text_source}] ${item.question.id}. ${item.question.question}</div>
          <div class="wrong-ans">❌ 你的答案: ${item.selected} | ✅ 正確答案: ${item.question.answer}</div>
          <div class="wrong-exp"><strong>解析:</strong> ${item.question.explanation}</div>
        `;
        container.appendChild(div);
      });
    } else {
      reviewSection.classList.add('hidden');
    }
  }
  
  function exitQuiz() {
    if (confirm('確定要放棄作答並返回選單嗎？')) {
      resetQuiz();
    }
  }
  
  function resetQuiz() {
    document.getElementById('setupScreen').classList.remove('hidden');
    document.getElementById('quizScreen').classList.add('hidden');
    document.getElementById('resultScreen').classList.add('hidden');
    quizMode = null;
    selectedText = null;
    document.getElementById('startBtn').disabled = true;
    
    // Clear mode borders
    document.querySelectorAll('.mode-card').forEach(c => c.style.borderColor = 'var(--color-border-tertiary)');
    document.getElementById('textSelectSection').style.display = 'none';
  }
  
  window.onload = () => {
    resetQuiz();
  };
</script>
</body>
</html>
