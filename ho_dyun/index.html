<style>
  :root {
    --color-bg-main: #f8f6f2; /* 品牌輕透米白 */
    --color-bg-card: #ffffff;
    --color-text-primary: #2e2d2e; /* 深炭灰 */
    --color-text-secondary: #5a5a5a;
    --color-accent-teal: #0097b2; /* 品牌亮青 */
    --color-accent-teal-hover: #007a91;
    --color-brand-green: #004754; /* 品牌主色：深青色 */
    --color-brand-gold: #c3bf75; /* 品牌副色：金色 */
    --color-border: rgba(0, 71, 84, 0.1);
    --shadow-sm: 0 2px 6px rgba(0, 71, 84, 0.03);
    --shadow-md: 0 4px 15px rgba(0, 71, 84, 0.04);
    --shadow-lg: 0 10px 24px rgba(0, 71, 84, 0.06);
    --border-radius: 12px;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --color-bg-main: #001f25; /* 極深青色 */
      --color-bg-card: #002c34; /* 深青色卡片 */
      --color-text-primary: #f8f6f2;
      --color-text-secondary: #a3b8cc;
      --color-border: rgba(195, 191, 117, 0.2);
    }
  }

  body {
    font-family: 'Inter', 'Noto Sans TC', sans-serif;
    background-color: var(--color-bg-main);
    color: var(--color-text-primary);
    margin: 0;
    padding: 20px;
    line-height: 1.6;
  }

  .wrap {
    max-width: 850px;
    margin: 0 auto;
    background: var(--color-bg-card);
    padding: 45px;
    border-radius: var(--border-radius);
    box-shadow: var(--shadow-lg);
    border: 1px solid var(--color-border);
  }

  .hero {
    background: linear-gradient(135deg, var(--color-brand-green), #001f25);
    color: #f8f6f2;
    padding: 3.5rem 2rem 3rem;
    text-align: center;
    border-bottom: 4px solid var(--color-brand-gold);
    position: relative;
    box-shadow: var(--shadow-md);
    border-radius: var(--border-radius);
    overflow: hidden;
    margin-bottom: 2rem;
  }

  .hero-tag {
    display: inline-block;
    font-size: 11px;
    letter-spacing: 0.15em;
    background: rgba(195, 191, 117, 0.15);
    color: var(--color-brand-gold);
    border: 1px solid rgba(195, 191, 117, 0.35);
    padding: 0.3rem 1.2rem;
    border-radius: 30px;
    margin-bottom: 1rem;
    font-weight: 600;
    text-transform: uppercase;
  }

  .hero h1 {
    font-family: 'Noto Serif TC', serif;
    font-size: 2.4rem;
    margin: 0 0 0.6rem;
    font-weight: 700;
    letter-spacing: 1px;
    line-height: 1.4;
  }

  .hero p {
    font-size: 0.95rem;
    opacity: 0.8;
    max-width: 700px;
    margin: 0 auto;
  }

  .section-header {
    display: flex;
    align-items: center;
    margin: 3.5rem 0 1.5rem;
    padding-bottom: 0.6rem;
    border-bottom: 2px solid var(--color-border);
  }

  .section-icon {
    font-size: 1.6rem;
    margin-right: 0.8rem;
  }

  .section-header h2 {
    font-family: 'Noto Serif TC', serif;
    font-size: 1.5rem;
    margin: 0;
    color: var(--color-brand-green);
  }

  @media (prefers-color-scheme: dark) {
    .section-header h2 {
      color: var(--color-brand-gold);
    }
  }

  .nav-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1.5rem;
    margin: 1.5rem 0;
  }

  @media (max-width: 600px) {
    .nav-grid {
      grid-template-columns: 1fr;
    }
  }

  .nav-card {
    background-color: var(--color-bg-card);
    border: 1px solid var(--color-border);
    border-radius: var(--border-radius);
    padding: 1.8rem;
    text-decoration: none;
    color: var(--color-text-primary);
    transition: all 0.2s ease;
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    border-left: 4px solid var(--color-brand-gold);
  }

  .nav-card:hover {
    transform: translateY(-3px);
    box-shadow: var(--shadow-md);
    border-color: var(--color-brand-gold);
  }

  .nav-card h3 {
    margin: 0 0 0.5rem 0;
    font-family: 'Noto Serif TC', serif;
    font-size: 1.2rem;
    color: var(--color-brand-green);
  }

  @media (prefers-color-scheme: dark) {
    .nav-card h3 {
      color: var(--color-text-primary);
    }
  }

  .nav-card .dot {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    background: var(--color-brand-green);
    color: var(--color-brand-gold);
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: bold;
    margin-bottom: 1rem;
    font-size: 14px;
    border: 1px solid var(--color-brand-gold);
  }

  .nav-card p {
    margin: 0;
    color: var(--color-text-secondary);
    font-size: 0.95rem;
  }
</style>
